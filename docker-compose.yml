services:
  spot-core:
    image: python:3.11-slim
    container_name: spot-core
    working_dir: /srv/spot-core
    volumes:
      - ./spot-core:/srv/spot-core
      - ./watch:/srv/watch
      - ./HANDOFF.md:/home/ogre/spot-stack/HANDOFF.md:rw
      - ./ROADMAP.md:/home/ogre/spot-stack/ROADMAP.md:rw
      - /mnt/collective:/mnt/collective
      - /mnt/collective/fleet/spot-core/shared_memory:/srv/spot-core/shared_memory
      - ./watch:/watch
      - /home/ogre/.ssh:/host-ssh:ro
      - ./:/home/ogre/spot-stack:rw
    env_file:
      - ./spot-core/.env
    environment:
      SPOTCORE_CONFIG: /srv/spot-core/config/cluster_config.json
      SPOTCORE_WATCH_STATE: /srv/watch/state/fleet-status.json
      SPOTCORE_EXEC_HISTORY: /srv/spot-core/shared_memory/exec-history.jsonl
      SPOTCORE_DECISION_LOG: /srv/spot-core/shared_memory/decision-history.jsonl
      PYTHONUNBUFFERED: "1"
    command: >
      bash -lc "
        apt-get update &&
        apt-get install -y --no-install-recommends openssh-client jq curl &&
        rm -rf /var/lib/apt/lists/* &&
          mkdir -p /root/.ssh &&
          cp /host-ssh/spot_fleet /root/.ssh/spot_fleet &&
          cp /host-ssh/spot_fleet.pub /root/.ssh/spot_fleet.pub 2>/dev/null || true &&
          cp /host-ssh/id_ed25519 /root/.ssh/id_ed25519 2>/dev/null || true &&
          cp /host-ssh/id_ed25519.pub /root/.ssh/id_ed25519.pub 2>/dev/null || true &&
          cp /host-ssh/known_hosts /root/.ssh/known_hosts 2>/dev/null || true &&
          printf 'Host *\\n    IdentityFile /root/.ssh/spot_fleet\\n    IdentitiesOnly yes\\n    UserKnownHostsFile /root/.ssh/known_hosts\\n' > /root/.ssh/config &&
          chmod 700 /root/.ssh &&
          chmod 600 /root/.ssh/spot_fleet &&
          chmod 644 /root/.ssh/spot_fleet.pub 2>/dev/null || true &&
          chmod 600 /root/.ssh/config &&
          chmod 600 /root/.ssh/id_ed25519 2>/dev/null || true &&
          chmod 644 /root/.ssh/id_ed25519.pub 2>/dev/null || true &&
          chmod 644 /root/.ssh/known_hosts 2>/dev/null || true &&
        pip install --no-cache-dir -r requirements.txt &&
        uvicorn spotcore.app:app --host 0.0.0.0 --port 8787
      "

    ports:
      - "8787:8787"
    restart: unless-stopped
